<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <title>Catch Game</title>
        <link rel="stylesheet" href="css/6CatchTheButton.css">
    </head>

    <body class="bg-light">

        <div class="container d-flex align-items-center justify-content-center">



            <div class="card justify-content-center align-items-center d-flex" style="width: 40rem;">
                <div class="card-body">

                    <div>
                        <button class="btn btn-secondary" id="btnStartGame" onclick="startGame()">Start</button>
                    </div>

                    <div class="form-group" id="displayGame" style="display: none;">



                        <div class="form-group">
                            <p>Time: <b><span id="timer"> 30 </span></b> </p>
                            <p id="highScore">High score: <b><span id="highScoreColor" style="color: red">0</span></b> </p>
                            <p id="displayPoints">Points: <b><span id="colorPoints" style="color: red">0</span></b> </p>
                            <p id="finalPoints" style="display: none;">Finals points: <b><span id="finalPointsColor"></span></b> </p>

                            <h1 id="gameOver"></h1>
                            <button class="btn btn-secondary" id="btnPlayAgain" style="display: none;">Play Again</button>
                        </div>

                        <div id="gameArea" class="form-group border border-3 border-dark" style="margin-top: 10px; height: 18rem; width: 35rem; position: relative;">
                            <button class="btn btn-secondary" id="btnCatchMe" style="position: absolute;">Catch Me!</button>
                        </div>

                        <div class="form-group">
                            <button class="btn btn-secondary" style="display: none" onclick="btnPlayAgain();">Play again!</button>
                        </div>
                    </div>


                </div>
            </div>



        </div>

        <script src="scripts/6CatchTheButton.js"></script>

    </body>

</html>
