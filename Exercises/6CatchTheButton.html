<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <title>Catch Game</title>
        <link rel="stylesheet" href="css/6CatchTheButton.css">
    </head>

    <body class="bg-light">

        <div class="container d-flex align-items-center justify-content-center">

<!--        <nav>-->
<!--            <ul>-->
<!--                <li><a href="">Home</a></li>-->
<!--                <li><a href="">Game</a></li>-->
<!--                <li><a href="">About</a></li>-->
<!--                <li><a href="">Contact</a></li>-->
<!--            </ul>-->
<!--        </nav>-->

            <div class="card justify-content-center align-items-center d-flex" style="width: 40rem; top: 10rem;">
                <div class="card-body" id="StartingDisplay" >

                    <div class="form-group" id="WelcomeMessage">
                        <h1 class="justify-content-center align-items-center d-flex">Welcome to Catch the Button!</h1>
                        <p class="justify-content-center align-items-center d-block">If you want to reach<span> High </span>Score, then press the Start button and begin your journey.</p>
                    </div>

                    <div class="form-group justify-content-center align-items-center mt-2" id="CurrentGameModeBox" style="display: block;">
                        <p class="justify-content-center align-items-center d-flex my-1">Choose your Game Mode!</p>
                        <div class="d-flex justify-content-center align-items-center">
                            <button class="btn btn-secondary mx-1" id="btnEasyGameMode">Easy</button>
                            <button class="btn btn-secondary mx-1" id="btnMediumGameMode">Medium</button>
                            <button class="btn btn-secondary mx-1" id="btnHardGameMode">Hard</button>
                        </div>

                        <p class="justify-content-center align-items-center d-flex mt-2">Current game mode: <span class="m-1" id="DisplayCurrentGameMode">...</span></p>

                        <div class="alert alert-danger justify-content-center align-items-center" id="EmptyGameModeAlert" style="display: none;">
                            <p class="m-0">You must choose game mode level, before continuing!</p>
                        </div>
                    </div>
                </div>

                    <div class="form-group justify-content-center align-items-center d-flex mb-3">
                        <button class="btn btn-secondary" id="btnStartGame">Start</button>
                    </div>

                    <div class="form-group" id="displayGame" style="display: none;">

                        <div class="form-group">
                            <p>Time: <b><span id="timer"></span></b> </p>
                            <p id="highScore">High score: <b><span id="highScoreColor" style="color: red">0</span></b> </p>
                            <p id="displayPoints">Points: <b><span id="colorPoints" style="color: red">0</span></b> </p>
                            <p id="finalPoints" style="display: none;">Finals points: <b><span class="m-1" id="finalPointsColor"></span></b> </p>

                            <h1 id="gameOver"></h1>
                        </div>

                        <div id="gameArea" class="form-group border border-3 border-dark" style="margin-top: 10px; height: 18rem; width: 35rem; position: relative;">
                            <button class="btn btn-secondary" id="btnCatchMe" style="position: absolute;">Catch Me!</button>
                        </div>

                        <div class="form-group mt-3" style="display: flex; align-items: center; justify-content: center;">
                            <button class="btn btn-secondary" id="btnPlayAgain" style="display: none">Play again!</button>
                        </div>

                    </div>


                </div>
            </div>

        <script src="scripts/6CatchTheButton.js"></script>

    </body>

</html>
